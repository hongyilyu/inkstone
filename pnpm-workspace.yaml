packages:
  - "apps/*"
  - "packages/*"
  - "bridges/*"
  - "tests/*"
# pnpm 11 aborts a non-interactive install (ERR_PNPM_IGNORED_BUILDS) when a
# dependency ships an un-approved build script; onlyBuiltDependencies alone does
# not suppress it. Downgrading to a warning lets `pnpm install --frozen-lockfile`
# succeed in CI while the allowlist below still scopes which deps run scripts.
strictDepBuilds: false
onlyBuiltDependencies:
  - "@google/genai"
  - esbuild
  - msgpackr-extract
  - protobufjs
